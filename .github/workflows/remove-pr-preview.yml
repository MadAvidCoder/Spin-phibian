name: Remove PR Preview

on:
  pull_request:
    types:
      - closed

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      deployments: write
      actions: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview
        run: |
          rm -rf pr-${{ github.event.number }}
      
      - name: Commit and Push
        run: |
          git config user.name "github-ci[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Remove preview for PR #${{ github.event.number }}"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi
      
      - name: Delete Environment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ENV_DELETE_TOKEN }}
          script: |
            const envName = `pr-${context.payload.pull_request.number}`;

            try {
              await github.request(
                "DELETE /repos/{owner}/{repo}/environments/{environment_name}",
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  environment_name: envName
                }
              );

              console.log(`Deleted environment ${envName}`);
            } catch (err) {
              console.log(err.message);
            }